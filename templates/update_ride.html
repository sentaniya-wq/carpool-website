<!DOCTYPE html>
<html>
<head>
  <title>Update Ride</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

  <div class="app-header">
    🚗 SchoolPool
  </div>
  <h1>Update Ride</h1>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    {{ csrf_token() }}

    <label>Day</label>
    <select name="day" required>
      <option {% if ride.day=="Monday" %}selected{% endif %}>Monday</option>
      <option {% if ride.day=="Tuesday" %}selected{% endif %}>Tuesday</option>
      <option {% if ride.day=="Wednesday" %}selected{% endif %}>Wednesday</option>
      <option {% if ride.day=="Thursday" %}selected{% endif %}>Thursday</option>
      <option {% if ride.day=="Friday" %}selected{% endif %}>Friday</option>
    </select>

    <label>Date</label>
    <input type="date" name="date" value="{{ ride.date }}" required>

    <label>Seats Available</label>
    <input type="number" name="seats" value="{{ ride.total_seats }}" min="1" required>

    <label>Society</label>
    <input type="text" name="society" value="{{ ride.society }}" required>

    <label>Area</label>
    <input type="text" name="area" value="{{ ride.area }}" required>

    <button type="submit">Update Ride</button>
  </form>

  <br>
  <a href="{{ url_for('view_rides') }}"><button class="secondary">Back</button></a>

</div>

<div class="bottom-nav">
  <a href="{{ url_for('dashboard') }}">🏠</a>
  <a href="{{ url_for('view_rides') }}">🚗</a>
  <a href="{{ url_for('my_rides') }}">📋</a>
  <a href="{{ url_for('logout') }}">🚪</a>
</div>

</body>
</html>
